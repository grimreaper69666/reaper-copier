<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaper Copier</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0a0a0f;
            --card: #12121a;
            --border: #1f1f2e;
            --text: #e6e6e6;
            --text-dim: #888;
            --green: #00d084;
            --red: #ef4444;
            --blue: #3b82f6;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        
        /* Header */
        .header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo { font-size: 1.25rem; font-weight: 600; }
        .status { font-size: 0.875rem; color: var(--green); }
        
        /* Mobile Nav */
        .nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 0.5rem 0;
            z-index: 100;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0.5rem;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.625rem;
            border: none;
            background: none;
            cursor: pointer;
        }
        
        .nav-item.active { color: var(--green); }
        .nav-item span { font-size: 1.25rem; margin-bottom: 2px; }
        
        /* Main Content */
        .main {
            padding: 1rem;
            padding-bottom: 80px;
        }
        
        .page { display: none; }
        .page.active { display: block; }
        
        /* Cards */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        
        .card-title {
            font-size: 0.875rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
        }
        
        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 0.25rem;
        }
        
        /* Forms */
        .form-group {
            margin-bottom: 1rem;
        }
        
        label {
            display: block;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
        }
        
        input, select {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 1rem;
        }
        
        /* Buttons */
        .btn {
            width: 100%;
            padding: 0.875rem;
            background: var(--blue);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn-success { background: var(--green); color: black; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Toggle */
        .toggle {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 1rem 0;
        }
        
        .switch {
            position: relative;
            width: 48px;
            height: 24px;
        }
        
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--border);
            border-radius: 24px;
            transition: 0.3s;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }
        
        input:checked + .slider { background: var(--green); }
        input:checked + .slider:before { transform: translateX(24px); }
        
        /* Tables */
        table {
            width: 100%;
            font-size: 0.875rem;
            border-collapse: collapse;
        }
        
        th {
            text-align: left;
            padding: 0.75rem 0.5rem;
            color: var(--text-dim);
            font-weight: 500;
            border-bottom: 1px solid var(--border);
        }
        
        td {
            padding: 0.75rem 0.5rem;
            border-bottom: 1px solid var(--border);
        }
        
        .empty {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-dim);
        }
        
        .badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .badge-green { background: rgba(0, 208, 132, 0.15); color: var(--green); }
        .badge-red { background: rgba(239, 68, 68, 0.15); color: var(--red); }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">🎯 Reaper</div>
        <div class="status" id="status">● Online</div>
    </header>
    
    <nav class="nav">
        <button class="nav-item active" onclick="showPage('dashboard')">
            <span>📊</span>Dash
        </button>
        <button class="nav-item" onclick="showPage('trades')">
            <span>📈</span>Trades
        </button>
        <button class="nav-item" onclick="showPage('broker')">
            <span>🏦</span>Broker
        </button>
        <button class="nav-item" onclick="showPage('settings')">
            <span>⚙️</span>Settings
        </button>
    </nav>
    
    <main class="main">
        <!-- Dashboard -->
        <div id="dashboard" class="page active">
            <div class="card">
                <div class="card-title">Account Overview</div>
                <div class="stats-grid">
                    <div class="stat">
                        <div class="stat-value" id="total-pnl">$0</div>
                        <div class="stat-label">Total P&L</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="daily-pnl">$0</div>
                        <div class="stat-label">Daily</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="positions-count">0</div>
                        <div class="stat-label">Positions</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="win-rate">0%</div>
                        <div class="stat-label">Win Rate</div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-title">Open Positions</div>
                <div id="positions-list">
                    <div class="empty">No open positions</div>
                </div>
            </div>
        </div>
        
        <!-- Trades -->
        <div id="trades" class="page">
            <div class="card">
                <div class="card-title">Trade History</div>
                <div id="trades-list">
                    <div class="empty">No trades yet</div>
                </div>
            </div>
        </div>
        
        <!-- Broker -->
        <div id="broker" class="page">
            <div class="card">
                <div class="card-title">Connect Broker</div>
                
                <div class="form-group">
                    <label>Broker</label>
                    <select id="broker-type">
                        <option value="tradovate">Tradovate</option>
                        <option value="tradestation">TradeStation</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="broker-user" placeholder="your-username">
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="broker-pass" placeholder="your-password">
                </div>
                
                <button class="btn" onclick="connectBroker()">Connect</button>
                
                <div id="broker-result" style="margin-top: 1rem;"></div>
            </div>
        </div>
        
        <!-- Settings -->
        <div id="settings" class="page">
            <div class="card">
                <div class="card-title">Position Sizing</div>
                
                <div class="form-group">
                    <label>Sizing Mode</label>
                    <select id="sizing-mode">
                        <option value="fixed">Fixed Contracts</option>
                        <option value="risk" selected>Risk-Based</option>
                        <option value="percent">Percent of Account</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Risk Per Trade (%)</label>
                    <input type="number" id="risk-pct" value="2" min="0.1" max="10" step="0.1">
                </div>
                
                <div class="form-group">
                    <label>Account Size ($)</label>
                    <input type="number" id="account-size" value="10000" min="1000">
                </div>
            </div>
            
            <div class="card">
                <div class="card-title">Risk Limits</div>
                
                <div class="form-group">
                    <label>Max Positions</label>
                    <input type="number" id="max-pos" value="5" min="1" max="20">
                </div>
                
                <div class="form-group">
                    <label>Max Daily Loss (%)</label>
                    <input type="number" id="max-loss" value="5" min="1" max="20">
                </div>
                
                <div class="toggle">
                    <label class="switch">
                        <input type="checkbox" id="bracket-orders" checked>
                        <span class="slider"></span>
                    </label>
                    <span>Bracket Orders</span>
                </div>
            </div>
            
            <button class="btn btn-success" onclick="saveSettings()">Save Settings</button>
        </div>
    </main>
    
    <script>
        // Navigation
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            event.target.closest('.nav-item').classList.add('active');
        }
        
        // Load data
        async function loadData() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                
                document.getElementById('positions-count').textContent = data.positions;
            } catch (e) {
                console.error('Failed to load:', e);
            }
        }
        
        // Connect broker
        async function connectBroker() {
            const type = document.getElementById('broker-type').value;
            const user = document.getElementById('broker-user').value;
            const pass = document.getElementById('broker-pass').value;
            const result = document.getElementById('broker-result');
            
            if (!user || !pass) {
                result.innerHTML = '<div style="color: var(--red);">Enter credentials</div>';
                return;
            }
            
            result.innerHTML = 'Connecting...';
            
            try {
                const res = await fetch('/api/broker/connect', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({type, username: user, password: pass})
                });
                
                const data = await res.json();
                result.innerHTML = data.status === 'success' 
                    ? '<div style="color: var(--green);">✓ Connected</div>'
                    : '<div style="color: var(--red);">✗ ' + data.message + '</div>';
            } catch (e) {
                result.innerHTML = '<div style="color: var(--red);">Error</div>';
            }
        }
        
        // Save settings
        async function saveSettings() {
            const btn = event.target;
            const original = btn.textContent;
            
            btn.textContent = 'Saved!';
            btn.style.background = 'var(--green)';
            btn.style.color = 'black';
            
            setTimeout(() => {
                btn.textContent = original;
                btn.style.background = '';
                btn.style.color = '';
            }, 1500);
        }
        
        // Initial load
        loadData();
        setInterval(loadData, 5000);
    </script>
</body>
</html>
